<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JokeSpark — AI Joke Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="custom.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center mb-5">
            <div class="col-md-8 text-center">
                <i class="fas fa-laugh-beam fa-4x text-warning mb-3"></i>
                <h1 class="display-4 fw-bold">JokeSpark</h1>
                <p class="lead text-muted">Generate hilarious jokes on any topic instantly.</p>
            </div>
        </div>
        <div class="row justify-content-center mb-5">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-4">
                        <form id="joke-form" novalidate>
                            <div class="mb-4">
                                <label for="topic-input" class="form-label fw-semibold">
                                    <i class="fas fa-tag me-2"></i>Topic (Optional)
                                </label>
                                <input type="text" class="form-control form-control-lg" id="topic-input"
                                    placeholder="e.g., programming, dark, pun, christmas...">
                                <div class="form-text">Try: programming · dark · pun · spooky · christmas</div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-secondary btn-lg fw-semibold" id="generate-btn">
                                    <i class="fas fa-magic me-2"></i>
                                    <span id="btn-text">Generate Joke</span>
                                    <div class="spinner-border spinner-border-sm ms-2 d-none" id="loading-spinner"></div>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div id="initial-state" class="text-center py-5">
                    <i class="fas fa-lightbulb fa-3x text-muted mb-3"></i>
                    <h3 class="text-muted">Ready for some laughs?</h3>
                </div>
                <div id="loading-state" class="text-center py-5 d-none">
                    <div class="spinner-border text-secondary mb-3"></div>
                    <h3 class="text-muted">Crafting the perfect joke...</h3>
                </div>
                <div id="error-state" class="alert alert-danger d-none">
                    <h4 class="alert-heading">Oops!</h4>
                    <p id="error-message">Could not fetch a joke. Please try again.</p>
                    <button class="btn btn-outline-danger btn-sm" onclick="generateJoke()">Try Again</button>
                </div>
                <div id="joke-display" class="d-none">
                    <div class="card shadow-lg border-0 joke-card">
                        <div class="card-body p-4">
                            <div id="joke-setup-container" class="mb-3 d-none">
                                <h4 class="card-title text-info mb-3">
                                    <i class="fas fa-quote-left me-2"></i>
                                    <span id="joke-setup"></span>
                                </h4>
                            </div>
                            <h3 class="card-text fw-bold" id="joke-punchline"></h3>
                            <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
                                <span class="badge bg-secondary" id="joke-category"></span>
                                <div class="joke-actions">
                                    <button class="btn btn-outline-success btn-sm me-2" onclick="rateJoke('like')">
                                        <i class="fas fa-thumbs-up"></i>
                                    </button>
                                    <button class="btn btn-outline-secondary btn-sm me-2" onclick="shareJoke()">
                                        <i class="fas fa-share"></i>
                                    </button>
                                    <button class="btn btn-outline-info btn-sm" onclick="generateJoke()">
                                        <i class="fas fa-redo"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-5">
            <div class="col-md-8">
                <div class="card bg-dark border-secondary">
                    <div class="card-body text-center">
                        <h5 class="card-title mb-3"><i class="fas fa-chart-bar me-2"></i>Your Session</h5>
                        <div class="row">
                            <div class="col-4">
                                <h3 class="text-info" id="jokes-generated">0</h3>
                                <small class="text-muted">Generated</small>
                            </div>
                            <div class="col-4">
                                <h3 class="text-success" id="jokes-liked">0</h3>
                                <small class="text-muted">Liked</small>
                            </div>
                            <div class="col-4">
                                <h3 class="text-warning" id="favorite-category">None</h3>
                                <small class="text-muted">Top Category</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="joke-generator.js"></script>
</body>
</html>
